<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Galsen Trip V2.3</title>

<style>
body { margin: 0; overflow: hidden; }
canvas { display: block; }

/* 🎮 joystick */
#joystickArea {
  position: absolute;
  bottom: 40px;
  left: 40px;
  width: 140px;
  height: 140px;
  background: rgba(255,255,255,0.25);
  border-radius: 50%;
  z-index: 10;
}

#stick {
  position: absolute;
  width: 60px;
  height: 60px;
  background: white;
  border-radius: 50%;
  top: 40px;
  left: 40px;
  touch-action: none;
}

/* 🧭 HUD */
#hud {
  position: absolute;
  top: 10px;
  left: 10px;
  color: white;
  font-family: Arial;
  z-index: 20;
  font-size: 14px;
}
</style>
</head>

<body>

<div id="hud">
💰 Argent: <span id="money">0</span><br>
🚨 Recherche: <span id="wanted">0</span><br>
🎯 Mission: <span id="mission">Aucune</span>
</div>

<div id="joystickArea">
  <div id="stick"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<script>

let scene, camera, renderer;
let car;

let dx=0,dy=0;
let speed=0.35;

let money=0;
let wanted=0;

// 🎯 mission system
let missionActive=false;
let missionTarget;

// 🧍 police
let policeList=[];

init();
animate();

function init(){

  scene=new THREE.Scene();
  scene.background=new THREE.Color(0x87ceeb);

  camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);

  renderer=new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(innerWidth,innerHeight);
  document.body.appendChild(renderer.domElement);

  // 🌍 ville (Dakar simplifié)
  let ground=new THREE.Mesh(
    new THREE.PlaneGeometry(400,400),
    new THREE.MeshBasicMaterial({color:0x2ecc71})
  );
  ground.rotation.x=-Math.PI/2;
  scene.add(ground);

  // 🚗 joueur
  car=new THREE.Mesh(
    new THREE.BoxGeometry(2,1,4),
    new THREE.MeshBasicMaterial({color:0xff0000})
  );
  car.position.y=0.5;
  scene.add(car);

  camera.position.set(0,6,12);

  // 🚓 police
  for(let i=0;i<4;i++){
    let p=new THREE.Mesh(
      new THREE.BoxGeometry(2,2,4),
      new THREE.MeshBasicMaterial({color:0x000000})
    );
    p.position.set(rand(),1,rand());
    p.speed=0.05;
    scene.add(p);
    policeList.push(p);
  }

  // 🎯 première mission
  createMission();

  setupJoystick();
  window.addEventListener("resize",onResize);
}

function animate(){
  requestAnimationFrame(animate);

  // 🚗 déplacement
  car.position.x+=dx*speed;
  car.position.z+=dy*speed;

  // 💰 argent
  money+=0.05;
  document.getElementById("money").innerText=Math.floor(money);

  // 🚨 wanted level (augmente si tu bouges vite)
  if(Math.abs(dx)+Math.abs(dy)>1.2){
    wanted=Math.min(5,wanted+0.01);
  } else {
    wanted=Math.max(0,wanted-0.01);
  }
  document.getElementById("wanted").innerText=Math.floor(wanted);

  // 🚓 police chase
  policeList.forEach(p=>{
    let dirX=car.position.x-p.position.x;
    let dirZ=car.position.z-p.position.z;

    p.position.x+=dirX*p.speed;
    p.position.z+=dirZ*p.speed;

    // collision police
    if(Math.abs(dirX)<2 && Math.abs(dirZ)<2){
      money=Math.max(0,money-1);
    }
  });

  // 🎯 mission check
  if(missionActive){
    let dxm=car.position.x-missionTarget.x;
    let dzm=car.position.z-missionTarget.z;

    if(Math.sqrt(dxm*dxm+dzm*dzm)<5){
      missionActive=false;
      money+=100;
      document.getElementById("mission").innerText="Réussie (+100💰)";
      setTimeout(createMission,2000);
    }
  }

  camera.position.x=car.position.x;
  camera.position.z=car.position.z+12;
  camera.lookAt(car.position);

  renderer.render(scene,camera);
}

// 🎯 mission system
function createMission(){
  missionTarget={
    x:(Math.random()-0.5)*150,
    z:(Math.random()-0.5)*150
  };
  missionActive=true;

  document.getElementById("mission").innerText="Va au point rouge";
}

// 🎮 joystick
function setupJoystick(){

  const stick=document.getElementById("stick");
  const area=document.getElementById("joystickArea");

  const center=70,max=50;

  function move(e){
    let t=e.touches[0];
    let r=area.getBoundingClientRect();

    let x=t.clientX-r.left-center;
    let y=t.clientY-r.top-center;

    let d=Math.sqrt(x*x+y*y);

    if(d>max){x=x/d*max;y=y/d*max;}

    stick.style.transform=`translate(${x}px,${y}px)`;

    dx=x/max;
    dy=y/max;
  }

  area.addEventListener("touchstart",move);
  area.addEventListener("touchmove",move);

  area.addEventListener("touchend",()=>{
    dx=0;dy=0;
    stick.style.transform="translate(0px,0px)";
  });
}

function rand(){
  return (Math.random()-0.5)*200;
}

function onResize(){
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
}

</script>

</body>
</html>
