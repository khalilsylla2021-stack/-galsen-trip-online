<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Galsen Trip V2.5</title>

<style>
body { margin:0; overflow:hidden; }
canvas { display:block; }

#joystickArea {
  position:absolute;
  bottom:40px;
  left:40px;
  width:140px;
  height:140px;
  background:rgba(255,255,255,0.25);
  border-radius:50%;
  z-index:10;
}

#stick {
  position:absolute;
  width:60px;
  height:60px;
  background:white;
  border-radius:50%;
  top:40px;
  left:40px;
  touch-action:none;
}

#hud {
  position:absolute;
  top:10px;
  left:10px;
  color:white;
  font-family:Arial;
  z-index:20;
  font-size:14px;
}
</style>
</head>

<body>

<div id="hud">
💰 Argent: <span id="money">0</span><br>
🚨 Recherche: <span id="wanted">0</span><br>
📍 Zone: Dakar (Prototype)
</div>

<div id="joystickArea">
  <div id="stick"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<script>

let scene,camera,renderer,car;

let dx=0,dy=0;
let speed=0.25;

let money=0;
let wanted=0;

let pnjList=[];
let traffic=[];

init();
animate();

function init(){

  scene=new THREE.Scene();
  scene.background=new THREE.Color(0x87ceeb);

  camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);

  renderer=new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(innerWidth,innerHeight);
  document.body.appendChild(renderer.domElement);

  // sol
  const ground=new THREE.Mesh(
    new THREE.PlaneGeometry(600,600),
    new THREE.MeshBasicMaterial({color:0x2ecc71})
  );
  ground.rotation.x=-Math.PI/2;
  scene.add(ground);

  // routes
  createRoad(0,0,400,25);
  createRoad(0,0,25,400);

  // joueur
  car=new THREE.Mesh(
    new THREE.BoxGeometry(2,1,4),
    new THREE.MeshBasicMaterial({color:0xff0000})
  );
  car.position.y=0.5;
  scene.add(car);

  camera.position.set(0,6,12);

  // PNJ
  for(let i=0;i<15;i++){
    let p=createHuman();
    p.position.set((Math.random()-0.5)*250,0,(Math.random()-0.5)*250);

    p.dir=Math.random()*Math.PI*2;
    p.timer=0;
    p.speed=0.02+Math.random()*0.03;

    scene.add(p);
    pnjList.push(p);
  }

  // trafic
  for(let i=0;i<8;i++){
    let t=new THREE.Mesh(
      new THREE.BoxGeometry(2,1,4),
      new THREE.MeshBasicMaterial({color:0xffff00})
    );

    t.position.set((Math.random()-0.5)*250,0.5,(Math.random()-0.5)*250);
    t.speed=0.06;

    scene.add(t);
    traffic.push(t);
  }

  setupJoystick();
  window.addEventListener("resize",onResize);
}

// humain
function createHuman(){
  let g=new THREE.Group();

  let body=new THREE.Mesh(
    new THREE.BoxGeometry(1,1.5,0.6),
    new THREE.MeshBasicMaterial({color:0x3366ff})
  );
  body.position.y=1.2;

  let head=new THREE.Mesh(
    new THREE.BoxGeometry(0.8,0.8,0.8),
    new THREE.MeshBasicMaterial({color:0xffcc99})
  );
  head.position.y=2.3;

  g.add(body);
  g.add(head);

  return g;
}

// route
function createRoad(x,z,w,h){
  let road=new THREE.Mesh(
    new THREE.PlaneGeometry(w,h),
    new THREE.MeshBasicMaterial({color:0x444444})
  );
  road.rotation.x=-Math.PI/2;
  road.position.set(x,0.01,z);
  scene.add(road);
}

function animate(){
  requestAnimationFrame(animate);

  // joueur movement (normalisé)
  let len=Math.sqrt(dx*dx+dy*dy);
  if(len>1){dx/=len;dy/=len;}

  car.position.x+=dx*speed;
  car.position.z+=dy*speed;

  // argent
  money+=0.03;
  document.getElementById("money").innerText=Math.floor(money);

  // wanted descend
  wanted=Math.max(0,wanted-0.02);
  document.getElementById("wanted").innerText=Math.floor(wanted);

  // collisions simples PNJ
  pnjList.forEach(p=>{
    p.position.x+=Math.cos(p.dir)*p.speed;
    p.position.z+=Math.sin(p.dir)*p.speed;

    p.timer++;
    if(p.timer>120){
      p.dir=Math.random()*Math.PI*2;
      p.timer=0;
    }

    if(distance(car,p)<3){
      wanted+=0.5;
    }
  });

  // trafic
  traffic.forEach(t=>{
    t.position.x+=t.speed;
    if(t.position.x>250)t.position.x=-250;

    if(distance(car,t)<4){
      wanted+=1;
    }
  });

  // caméra fluide
  camera.position.x+=(car.position.x-camera.position.x)*0.1;
  camera.position.z+=(car.position.z+12-camera.position.z)*0.1;
  camera.lookAt(car.position);

  renderer.render(scene,camera);
}

// distance helper
function distance(a,b){
  return Math.sqrt(
    (a.position.x-b.position.x)**2+
    (a.position.z-b.position.z)**2
  );
}

// joystick
function setupJoystick(){
  const stick=document.getElementById("stick");
  const area=document.getElementById("joystickArea");

  const center=70,max=50;

  function move(e){
    let t=e.touches[0];
    let r=area.getBoundingClientRect();

    let x=t.clientX-r.left-center;
    let y=t.clientY-r.top-center;

    let d=Math.sqrt(x*x+y*y);
    if(d>max){x=x/d*max;y=y/d*max;}

    stick.style.transform=`translate(${x}px,${y}px)`;

    dx=x/max;
    dy=y/max;
  }

  area.addEventListener("touchstart",move);
  area.addEventListener("touchmove",move);

  area.addEventListener("touchend",()=>{
    dx=0;dy=0;
    stick.style.transform="translate(0px,0px)";
  });
}

function onResize(){
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
}

</script>
</body>
</html>
