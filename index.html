<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Galsen Trip V2.2</title>

<style>
body { margin: 0; overflow: hidden; }
canvas { display: block; }

/* 🎮 joystick */
#joystickArea {
  position: absolute;
  bottom: 40px;
  left: 40px;
  width: 140px;
  height: 140px;
  background: rgba(255,255,255,0.25);
  border-radius: 50%;
  z-index: 10;
}

#stick {
  position: absolute;
  width: 60px;
  height: 60px;
  background: white;
  border-radius: 50%;
  top: 40px;
  left: 40px;
  touch-action: none;
}

/* 💰 UI */
#hud {
  position: absolute;
  top: 15px;
  left: 15px;
  color: white;
  font-family: Arial;
  z-index: 20;
}
</style>
</head>

<body>

<div id="hud">
💰 Argent: <span id="money">0</span><br>
🚨 Recherche: <span id="wanted">0</span>
</div>

<div id="joystickArea">
  <div id="stick"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<script>

let scene, camera, renderer;
let car;

let dx = 0;
let dy = 0;
let speed = 0.35;

let money = 0;
let wanted = 0;

let pnjList = [];
let policeList = [];
let trafficList = [];

init();
animate();

function init() {

  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x87ceeb);

  camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(innerWidth, innerHeight);
  document.body.appendChild(renderer.domElement);

  // 🌍 sol (Dakar simplifié)
  const ground = new THREE.Mesh(
    new THREE.PlaneGeometry(400, 400),
    new THREE.MeshBasicMaterial({ color: 0x2ecc71 })
  );
  ground.rotation.x = -Math.PI / 2;
  scene.add(ground);

  // 🚗 joueur
  car = new THREE.Mesh(
    new THREE.BoxGeometry(2,1,4),
    new THREE.MeshBasicMaterial({ color: 0xff0000 })
  );
  car.position.y = 0.5;
  scene.add(car);

  camera.position.set(0,6,12);

  // 🧍 PNJ
  for (let i=0;i<10;i++){
    let p = createBox(0x0000ff, 2,3,2);
    p.position.set(rand(),1.5,rand());
    scene.add(p);
    pnjList.push(p);
  }

  // 🚓 police
  for (let i=0;i<3;i++){
    let p = createBox(0x000000, 2,2,4);
    p.position.set(rand(),1,rand());
    p.speed = 0.04;
    scene.add(p);
    policeList.push(p);
  }

  // 🚗 trafic
  for (let i=0;i<5;i++){
    let t = createBox(0xffff00, 2,1,4);
    t.position.set(rand(),0.5,rand());
    t.speed = 0.02;
    scene.add(t);
    trafficList.push(t);
  }

  setupJoystick();
  window.addEventListener("resize", onResize);
}

function createBox(color,x,y,z){
  return new THREE.Mesh(
    new THREE.BoxGeometry(x,y,z),
    new THREE.MeshBasicMaterial({color})
  );
}

function rand(){
  return (Math.random()-0.5)*200;
}

function animate(){
  requestAnimationFrame(animate);

  // 🚗 mouvement joueur
  car.position.x += dx * speed;
  car.position.z += dy * speed;

  // 💰 gain d’argent (roulage)
  money += 0.05;
  document.getElementById("money").innerText = Math.floor(money);

  // 🚨 wanted level (simple)
  if (Math.random() < 0.001) wanted = Math.min(5, wanted+1);
  document.getElementById("wanted").innerText = wanted;

  // 🧍 PNJ mouvement
  pnjList.forEach((p,i)=>{
    p.position.x += Math.sin(Date.now()*0.001+i)*0.03;
    p.position.z += Math.cos(Date.now()*0.001+i)*0.03;
  });

  // 🚓 police chase
  policeList.forEach(p=>{
    p.position.x += (car.position.x - p.position.x)*0.01;
    p.position.z += (car.position.z - p.position.z)*0.01;
  });

  // 🚗 trafic simple
  trafficList.forEach(t=>{
    t.position.z += t.speed;
    if(t.position.z > 100) t.position.z = -100;
  });

  camera.position.x = car.position.x;
  camera.position.z = car.position.z + 12;
  camera.lookAt(car.position);

  renderer.render(scene,camera);
}

function setupJoystick(){
  const stick = document.getElementById("stick");
  const area = document.getElementById("joystickArea");

  const center=70,max=50;

  function move(e){
    let t=e.touches[0];
    let r=area.getBoundingClientRect();

    let x=t.clientX-r.left-center;
    let y=t.clientY-r.top-center;

    let d=Math.sqrt(x*x+y*y);

    if(d>max){x=x/d*max;y=y/d*max;}

    stick.style.transform=`translate(${x}px,${y}px)`;

    dx=x/max;
    dy=y/max;
  }

  area.addEventListener("touchstart",move);
  area.addEventListener("touchmove",move);

  area.addEventListener("touchend",()=>{
    dx=0;dy=0;
    stick.style.transform="translate(0px,0px)";
  });
}

function onResize(){
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
}

</script>

</body>
</html>
