<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Galsen Trip V3</title>

<style>
body { margin:0; overflow:hidden; font-family:Arial; }

/* MENU */
#menu {
  position:absolute;
  width:100%;
  height:100%;
  background:#000;
  color:white;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:100;
}

button{
  padding:12px 20px;
  font-size:18px;
  margin-top:10px;
}

/* HUD */
#hud {
  position:absolute;
  top:10px;
  left:10px;
  color:white;
  z-index:10;
}

/* joystick */
#joystickArea{
  position:absolute;
  bottom:40px;
  left:40px;
  width:140px;
  height:140px;
  background:rgba(255,255,255,0.2);
  border-radius:50%;
  z-index:10;
}

#stick{
  position:absolute;
  width:60px;
  height:60px;
  background:white;
  border-radius:50%;
  top:40px;
  left:40px;
}
</style>
</head>

<body>

<div id="menu">
  <h1>🌍 Galsen Trip V3</h1>
  <button onclick="startGame()">Jouer</button>
</div>

<div id="hud">
💰 <span id="money">0</span> |
🚨 <span id="wanted">0</span> |
⏰ <span id="time">12:00</span> |
🌤️ <span id="weather">Soleil</span>
</div>

<div id="joystickArea"><div id="stick"></div></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<script>

let scene,camera,renderer,car;
let dx=0,dy=0;

let money=0,wanted=0;

let time=12;
let weather="Soleil";

let birds=[];

function startGame(){
  document.getElementById("menu").style.display="none";
  init();
  animate();
}

function init(){

scene=new THREE.Scene();

camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,2000);

renderer=new THREE.WebGLRenderer();
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

// lumière jour/nuit
const light=new THREE.AmbientLight(0xffffff,1);
scene.add(light);

// sol énorme
let ground=new THREE.Mesh(
  new THREE.PlaneGeometry(2000,2000),
  new THREE.MeshBasicMaterial({color:0x1f8b4c})
);
ground.rotation.x=-Math.PI/2;
scene.add(ground);

// routes + lignes
createRoad(0,0,2000,40);

// voiture joueur (cube rouge temporaire)
car=new THREE.Mesh(
  new THREE.BoxGeometry(3,1,5),
  new THREE.MeshBasicMaterial({color:0xff0000})
);
car.position.y=0.5;
scene.add(car);

// voitures IA
for(let i=0;i<20;i++){
  let v=new THREE.Mesh(
    new THREE.BoxGeometry(3,1,5),
    new THREE.MeshBasicMaterial({color:0xffff00})
  );
  v.position.set(Math.random()*400-200,0.5,Math.random()*400-200);
  v.speed=0.5+Math.random();
  scene.add(v);
}

// immeubles simples
for(let i=0;i<30;i++){
  let b=new THREE.Mesh(
    new THREE.BoxGeometry(20,Math.random()*80+20,20),
    new THREE.MeshBasicMaterial({color:0x888888})
  );
  b.position.set(Math.random()*800-400,0,Math.random()*800-400);
  scene.add(b);
}

// oiseaux
for(let i=0;i<15;i++){
  let bird=new THREE.Mesh(
    new THREE.SphereGeometry(1),
    new THREE.MeshBasicMaterial({color:0x000000})
  );
  bird.position.set(Math.random()*500,50+Math.random()*50,Math.random()*500);
  bird.speed=0.5+Math.random();
  birds.push(bird);
  scene.add(bird);
}

camera.position.set(0,10,15);

setupJoystick();
}

function createRoad(x,z,w,h){

let road=new THREE.Mesh(
  new THREE.PlaneGeometry(w,h),
  new THREE.MeshBasicMaterial({color:0x333333})
);
road.rotation.x=-Math.PI/2;
scene.add(road);

// ligne centrale
let line=new THREE.Mesh(
  new THREE.PlaneGeometry(w,0.5),
  new THREE.MeshBasicMaterial({color:0xffff00})
);
line.rotation.x=-Math.PI/2;
line.position.y=0.01;
scene.add(line);
}

function animate(){

requestAnimationFrame(animate);

// voiture
car.position.x+=dx*0.5;
car.position.z+=dy*0.5;

// jour/nuit
time+=0.01;
if(time>24)time=0;

document.getElementById("time").innerText=time.toFixed(1);

// météo aléatoire
if(Math.random()<0.001){
  weather=["Soleil","Pluie","Nuage"][Math.floor(Math.random()*3)];
}
document.getElementById("weather").innerText=weather;

// oiseaux vol
birds.forEach(b=>{
  b.position.x+=b.speed;
  if(b.position.x>500)b.position.x=-500;
});

// caméra follow
camera.position.x=car.position.x;
camera.position.z=car.position.z+15;
camera.lookAt(car.position);

renderer.render(scene,camera);
}

function setupJoystick(){
const stick=document.getElementById("stick");
const area=document.getElementById("joystickArea");

let center=70,max=50;

area.addEventListener("touchmove",(e)=>{
  let t=e.touches[0];
  let r=area.getBoundingClientRect();

  let x=t.clientX-r.left-center;
  let y=t.clientY-r.top-center;

  let d=Math.sqrt(x*x+y*y);
  if(d>max){x=x/d*max;y=y/d*max;}

  stick.style.transform=`translate(${x}px,${y}px)`;

  dx=x/max;
  dy=y/max;
});

area.addEventListener("touchend",()=>{
  dx=0;dy=0;
  stick.style.transform="translate(0,0)";
});
}

</script>

</body>
</html>
