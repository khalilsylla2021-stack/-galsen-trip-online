<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>GTA 3D Mobile</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { margin:0; overflow:hidden; touch-action:none; }

#hud{
position:fixed;
top:10px;
left:10px;
color:white;
background:rgba(0,0,0,0.6);
padding:10px;
border-radius:8px;
z-index:10;
}

.btn{
position:fixed;
width:70px;
height:70px;
background:rgba(255,255,255,0.2);
color:white;
text-align:center;
line-height:70px;
font-size:25px;
border-radius:15px;
user-select:none;
z-index:10;
}

#up{bottom:160px;left:80px;}
#down{bottom:40px;left:80px;}
#left{bottom:100px;left:10px;}
#right{bottom:100px;left:150px;}
</style>
</head>

<body>

<div id="hud">
🌍 GTA 3D MOBILE<br>
💰 0 ⭐ 0
</div>

<div id="up" class="btn">⬆️</div>
<div id="down" class="btn">⬇️</div>
<div id="left" class="btn">⬅️</div>
<div id="right" class="btn">➡️</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>
// 🌍 SCÈNE
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x2ecc71);

// 📷 CAMÉRA
const camera = new THREE.PerspectiveCamera(
75, window.innerWidth/window.innerHeight, 0.1, 1000
);

// 🎮 RENDU
const renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// 🌍 SOL (ville)
const groundGeo = new THREE.PlaneGeometry(200,200);
const groundMat = new THREE.MeshBasicMaterial({color:0x228B22});
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// 🚗 VOITURE (cube 3D)
const carGeo = new THREE.BoxGeometry(1,1,2);
const carMat = new THREE.MeshBasicMaterial({color:0xffffff});
const car = new THREE.Mesh(carGeo, carMat);
car.position.y = 0.5;
scene.add(car);

// 💡 lumière simple
const light = new THREE.AmbientLight(0xffffff);
scene.add(light);

// 📍 caméra position
camera.position.set(0,5,8);
camera.lookAt(car.position);

// 🎮 CONTROLES
let c = {up:false,down:false,left:false,right:false};

document.getElementById("up").ontouchstart=()=>c.up=true;
document.getElementById("up").ontouchend=()=>c.up=false;

document.getElementById("down").ontouchstart=()=>c.down=true;
document.getElementById("down").ontouchend=()=>c.down=false;

document.getElementById("left").ontouchstart=()=>c.left=true;
document.getElementById("left").ontouchend=()=>c.left=false;

document.getElementById("right").ontouchstart=()=>c.right=true;
document.getElementById("right").ontouchend=()=>c.right=false;

function animate(){

requestAnimationFrame(animate);

// 🚗 mouvement voiture
if(c.up) car.position.z -= 0.2;
if(c.down) car.position.z += 0.2;
if(c.left) car.position.x -= 0.2;
if(c.right) car.position.x += 0.2;

// 📷 caméra suit voiture
camera.position.x = car.position.x;
camera.position.z = car.position.z + 8;
camera.lookAt(car.position);

renderer.render(scene,camera);
}

animate();

// 📱 resize mobile
window.addEventListener("resize",()=>{
camera.aspect = window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth,window.innerHeight);
});
</script>

</body>
</html>
