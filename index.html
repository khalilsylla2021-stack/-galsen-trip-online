<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Galsen Trip Mobile GTA</title>

<style>
body { margin:0; overflow:hidden; font-family:Arial; }

canvas { display:block; background:#2ecc71; }

/* HUD */
#hud{
position:fixed;
top:10px;
left:10px;
background:rgba(0,0,0,0.7);
color:white;
padding:10px;
border-radius:8px;
font-size:14px;
z-index:10;
}

/* BOUTONS MOBILE */
.btn{
position:fixed;
width:70px;
height:70px;
background:rgba(0,0,0,0.5);
color:white;
font-size:30px;
text-align:center;
line-height:70px;
border-radius:15px;
user-select:none;
z-index:10;
}

#up{bottom:160px;left:80px;}
#down{bottom:40px;left:80px;}
#left{bottom:100px;left:10px;}
#right{bottom:100px;left:150px;}
</style>
</head>

<body>

<div id="hud">
🎮 GTA Mobile<br>
💰 <span id="money">0</span><br>
⭐ <span id="wanted">0</span>
</div>

<div id="up" class="btn">⬆️</div>
<div id="down" class="btn">⬇️</div>
<div id="left" class="btn">⬅️</div>
<div id="right" class="btn">➡️</div>

<canvas id="game"></canvas>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let car={x:canvas.width/2,y:canvas.height/2,size:40,speed:6};
let money=0;
let wanted=0;

let mission={
x:Math.random()*canvas.width,
y:Math.random()*canvas.height
};

let control={up:false,down:false,left:false,right:false};

/* TOUCH CONTROLS */
document.getElementById("up").ontouchstart=()=>control.up=true;
document.getElementById("up").ontouchend=()=>control.up=false;

document.getElementById("down").ontouchstart=()=>control.down=true;
document.getElementById("down").ontouchend=()=>control.down=false;

document.getElementById("left").ontouchstart=()=>control.left=true;
document.getElementById("left").ontouchend=()=>control.left=false;

document.getElementById("right").ontouchstart=()=>control.right=true;
document.getElementById("right").ontouchend=()=>control.right=false;

function update(){

if(control.left)car.x-=car.speed;
if(control.right)car.x+=car.speed;
if(control.up)car.y-=car.speed;
if(control.down)car.y+=car.speed;

let dx=car.x-mission.x;
let dy=car.y-mission.y;

if(Math.sqrt(dx*dx+dy*dy)<40){
money+=100;
wanted=Math.min(5,wanted+1);

mission.x=Math.random()*canvas.width;
mission.y=Math.random()*canvas.height;

document.getElementById("money").innerText=money;
document.getElementById("wanted").innerText=wanted;
}
}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#2ecc71";
ctx.fillRect(0,0,canvas.width,canvas.height);

// mission
ctx.fillStyle="yellow";
ctx.beginPath();
ctx.arc(mission.x,mission.y,20,0,Math.PI*2);
ctx.fill();

// voiture
ctx.fillStyle="white";
ctx.fillRect(car.x,car.y,car.size,car.size);

if(wanted>0){
ctx.fillStyle="red";
ctx.fillText("🚓 POLICE ALERT",300,50);
}
}

function loop(){
update();
draw();
requestAnimationFrame(loop);
}
loop();
</script>

</body>
</html>
