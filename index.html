<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Galsen Trip GTA</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">

<style>
body { margin:0; overflow:hidden; font-family:Arial; touch-action:none; }

canvas { display:block; background:#2ecc71; }

#hud{
position:fixed;
top:10px;
left:10px;
background:rgba(0,0,0,0.7);
color:white;
padding:10px;
border-radius:8px;
z-index:10;
}

.btn{
position:fixed;
width:75px;
height:75px;
background:rgba(0,0,0,0.4);
color:white;
font-size:28px;
text-align:center;
line-height:75px;
border-radius:15px;
user-select:none;
z-index:10;
}

#up{bottom:160px;left:90px;}
#down{bottom:40px;left:90px;}
#left{bottom:100px;left:10px;}
#right{bottom:100px;left:170px;}
</style>
</head>

<body>

<div id="hud">
🎮 GTA Galsen Trip<br>
💰 <span id="money">0</span><br>
⭐ <span id="wanted">0</span>
</div>

<div id="up" class="btn">⬆️</div>
<div id="down" class="btn">⬇️</div>
<div id="left" class="btn">⬅️</div>
<div id="right" class="btn">➡️</div>

<canvas id="game"></canvas>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

// 🚗 PLAYER
let car={x:canvas.width/2,y:canvas.height/2,size:45,speed:7};

// 🎮 GAME STATS
let money=0;
let wanted=0;

// 🎯 mission
let mission={x:200,y:200};

// TOUCH CONTROL
let c={up:false,down:false,left:false,right:false};

document.getElementById("up").ontouchstart=()=>c.up=true;
document.getElementById("up").ontouchend=()=>c.up=false;

document.getElementById("down").ontouchstart=()=>c.down=true;
document.getElementById("down").ontouchend=()=>c.down=false;

document.getElementById("left").ontouchstart=()=>c.left=true;
document.getElementById("left").ontouchend=()=>c.left=false;

document.getElementById("right").ontouchstart=()=>c.right=true;
document.getElementById("right").ontouchend=()=>c.right=false;

function update(){

if(c.left)car.x-=car.speed;
if(c.right)car.x+=car.speed;
if(c.up)car.y-=car.speed;
if(c.down)car.y+=car.speed;

// limite écran
car.x=Math.max(0,Math.min(canvas.width,car.x));
car.y=Math.max(0,Math.min(canvas.height,car.y));

// mission
let dx=car.x-mission.x;
let dy=car.y-mission.y;

if(Math.sqrt(dx*dx+dy*dy)<45){
money+=100;
wanted=Math.min(5,wanted+1);

mission.x=Math.random()*canvas.width;
mission.y=Math.random()*canvas.height;

document.getElementById("money").innerText=money;
document.getElementById("wanted").innerText=wanted;
}
}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

// map
ctx.fillStyle="#2ecc71";
ctx.fillRect(0,0,canvas.width,canvas.height);

// mission
ctx.fillStyle="yellow";
ctx.beginPath();
ctx.arc(mission.x,mission.y,20,0,Math.PI*2);
ctx.fill();

// voiture
ctx.fillStyle="white";
ctx.fillRect(car.x,car.y,car.size,car.size);

// police alert
if(wanted>0){
ctx.fillStyle="red";
ctx.font="22px Arial";
ctx.fillText("🚓 POLICE ALERT",200,50);
}
}

function loop(){
update();
draw();
requestAnimationFrame(loop);
}
loop();
</script>

<script>
if("serviceWorker" in navigator){
navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
