<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Galsen Trip V2</title>

<style>
body {
  margin: 0;
  overflow: hidden;
}

/* 🎮 zone joystick */
#joystickArea {
  position: absolute;
  bottom: 40px;
  left: 40px;
  width: 140px;
  height: 140px;
  background: rgba(255,255,255,0.2);
  border-radius: 50%;
}

/* 🕹️ stick */
#stick {
  position: absolute;
  width: 60px;
  height: 60px;
  background: white;
  border-radius: 50%;
  top: 40px;
  left: 40px;
  touch-action: none;
}

/* canvas au-dessus */
canvas {
  display: block;
}
</style>
</head>

<body>

<div id="joystickArea">
  <div id="stick"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<script>
let scene, camera, renderer;
let car;

let joystick = {
  active: false,
  dx: 0,
  dy: 0
};

init();
animate();

function init() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x87ceeb);

  camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  // 🌍 sol
  let ground = new THREE.Mesh(
    new THREE.PlaneGeometry(200, 200),
    new THREE.MeshBasicMaterial({ color: 0x2ecc71 })
  );
  ground.rotation.x = -Math.PI / 2;
  scene.add(ground);

  // 🚗 voiture
  car = new THREE.Mesh(
    new THREE.BoxGeometry(2, 1, 4),
    new THREE.MeshBasicMaterial({ color: 0xff0000 })
  );
  car.position.y = 0.5;
  scene.add(car);

  camera.position.set(0, 5, 10);
  camera.lookAt(car.position);

  setupJoystick();
  window.addEventListener("resize", onResize);
}

function animate() {
  requestAnimationFrame(animate);

  // 🚗 déplacement avec joystick
  car.position.x += joystick.dx * 0.1;
  car.position.z += joystick.dy * 0.1;

  camera.position.x = car.position.x;
  camera.position.z = car.position.z + 10;
  camera.lookAt(car.position);

  renderer.render(scene, camera);
}

function onResize(){
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

/* 🎮 JOYSTICK LOGIC */
function setupJoystick(){
  const stick = document.getElementById("stick");
  const area = document.getElementById("joystickArea");

  let centerX = 70;
  let centerY = 70;
  let maxDist = 50;

  area.addEventListener("touchstart", (e)=>{
    joystick.active = true;
  });

  area.addEventListener("touchmove", (e)=>{
    let touch = e.touches[0];
    let rect = area.getBoundingClientRect();

    let x = touch.clientX - rect.left - centerX;
    let y = touch.clientY - rect.top - centerY;

    let dist = Math.sqrt(x*x + y*y);

    if(dist > maxDist){
      x *= maxDist/dist;
      y *= maxDist/dist;
    }

    stick.style.transform = `translate(${x}px, ${y}px)`;

    joystick.dx = x / maxDist;
    joystick.dy = y / maxDist;
  });

  area.addEventListener("touchend", ()=>{
    joystick.active = false;
    joystick.dx = 0;
    joystick.dy = 0;
    stick.style.transform = `translate(0px, 0px)`;
  });
}
</script>

</body>
</html>
