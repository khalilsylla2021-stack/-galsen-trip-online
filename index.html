<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>GTA Dakar Real</title>

<style>
body { margin:0; overflow:hidden; font-family:Arial; }
canvas { display:block; background:#2e8b57; }

#hud{
position:fixed;
top:10px;
left:10px;
background:rgba(0,0,0,0.7);
color:white;
padding:10px;
border-radius:8px;
z-index:10;
}
</style>
</head>

<body>

<div id="hud">
🌍 GTA DAKAR REAL<br>
💰 <span id="money">0</span><br>
⭐ <span id="wanted">0</span>
</div>

<canvas id="game"></canvas>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

// 🌍 MONDE
const world={w:2500,h:2500};

// 🚗 JOUEUR
let car={x:1200,y:1200,size:20,speed:6};

// 💰 STATS
let money=0;
let wanted=0;

// 🎯 MISSION
let mission={x:800,y:800};

// 🧍 PNJ HUMAIN (PETITS PERSONNAGES)
let pnj=[];
for(let i=0;i<25;i++){
pnj.push({
x:Math.random()*world.w,
y:Math.random()*world.h,
dir:Math.random()*2*Math.PI
});
}

// CAMÉRA
let cam={x:0,y:0};

// CONTROLES
let keys={};
window.addEventListener("keydown",e=>keys[e.key]=true);
window.addEventListener("keyup",e=>keys[e.key]=false);

function update(){

// joueur
if(keys["ArrowLeft"])car.x-=car.speed;
if(keys["ArrowRight"])car.x+=car.speed;
if(keys["ArrowUp"])car.y-=car.speed;
if(keys["ArrowDown"])car.y+=car.speed;

// caméra
cam.x=car.x-canvas.width/2;
cam.y=car.y-canvas.height/2;

// pnj mouvement (marche lente)
pnj.forEach(p=>{
p.x+=Math.cos(p.dir)*1;
p.y+=Math.sin(p.dir)*1;

if(Math.random()<0.01){
p.dir=Math.random()*2*Math.PI;
}
});

// mission
let dx=car.x-mission.x;
let dy=car.y-mission.y;

if(Math.sqrt(dx*dx+dy*dy)<40){
money+=100;
wanted=Math.min(5,wanted+1);

mission.x=Math.random()*world.w;
mission.y=Math.random()*world.h;

document.getElementById("money").innerText=money;
document.getElementById("wanted").innerText=wanted;
}
}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

// 🌍 ville
ctx.fillStyle="#2e8b57";
ctx.fillRect(0,0,world.w,world.h);

// routes
ctx.strokeStyle="#1b1b1b";
for(let i=0;i<15;i++){
ctx.beginPath();
ctx.moveTo(i*160-cam.x,0-cam.y);
ctx.lineTo(i*160-cam.x,world.h-cam.y);
ctx.stroke();

ctx.beginPath();
ctx.moveTo(0-cam.x,i*160-cam.y);
ctx.lineTo(world.w-cam.x,i*160-cam.y);
ctx.stroke();
}

// 🧍 PNJ humains (petits bonhommes)
pnj.forEach(p=>{
ctx.fillStyle="#ffd1a4"; // peau
ctx.beginPath();
ctx.arc(p.x-cam.x,p.y-cam.y,6,0,Math.PI*2);
ctx.fill();

// corps
ctx.fillStyle="blue";
ctx.fillRect(p.x-cam.x-4,p.y-cam.y+6,8,10);
});

// 🎯 mission
ctx.fillStyle="yellow";
ctx.beginPath();
ctx.arc(mission.x-cam.x,mission.y-cam.y,10,0,Math.PI*2);
ctx.fill();

// 🚗 joueur
ctx.fillStyle="white";
ctx.fillRect(car.x-cam.x,car.y-cam.y,car.size,car.size);

// police alert
if(wanted>0){
ctx.fillStyle="red";
ctx.font="18px Arial";
ctx.fillText("🚓 POLICE DAKAR",200,50);
}
}

function loop(){
update();
draw();
requestAnimationFrame(loop);
}
loop();
</script>

</body>
</html>
