<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>GTA 3D Dakar Open World</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { margin:0; overflow:hidden; touch-action:none; font-family:Arial; }

#hud{
position:fixed;
top:10px;
left:10px;
color:white;
background:rgba(0,0,0,0.6);
padding:10px;
border-radius:8px;
z-index:10;
}

.btn{
position:fixed;
width:70px;
height:70px;
background:rgba(255,255,255,0.2);
color:white;
text-align:center;
line-height:70px;
font-size:25px;
border-radius:15px;
user-select:none;
z-index:10;
}

#up{bottom:160px;left:80px;}
#down{bottom:40px;left:80px;}
#left{bottom:100px;left:10px;}
#right{bottom:100px;left:150px;}
</style>
</head>

<body>

<div id="hud">
🌍 GTA 3D DAKAR<br>
💰 0 ⭐ 0
</div>

<div id="up" class="btn">⬆️</div>
<div id="down" class="btn">⬇️</div>
<div id="left" class="btn">⬅️</div>
<div id="right" class="btn">➡️</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>
// 🌍 SCÈNE
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb); // ciel

// 📷 CAMERA
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);

// 🎮 RENDERER
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// 🌍 SOL (VILLE DAKAR)
const ground = new THREE.Mesh(
new THREE.PlaneGeometry(500,500),
new THREE.MeshBasicMaterial({color:0x2ecc71})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// 🏙 BÂTIMENTS (Dakar stylisé)
function addBuilding(x,z,color=0x888888){
const b = new THREE.Mesh(
new THREE.BoxGeometry(10,30,10),
new THREE.MeshBasicMaterial({color})
);
b.position.set(x,15,z);
scene.add(b);
}

for(let i=0;i<30;i++){
addBuilding((Math.random()-0.5)*400, (Math.random()-0.5)*400, 0x555555);
}

// 🚗 VOITURE
const car = new THREE.Mesh(
new THREE.BoxGeometry(3,2,5),
new THREE.MeshBasicMaterial({color:0xffffff})
);
car.position.y = 1;
scene.add(car);

// 🚓 POLICE (IA SIMPLE)
const police = new THREE.Mesh(
new THREE.BoxGeometry(3,2,5),
new THREE.MeshBasicMaterial({color:0xff0000})
);
police.position.set(20,1,20);
scene.add(police);

// 🌤 lumière
scene.add(new THREE.AmbientLight(0xffffff));

// caméra
camera.position.set(0,20,30);
camera.lookAt(car.position);

// 🎮 CONTROLES
let c={up:false,down:false,left:false,right:false};

document.getElementById("up").ontouchstart=()=>c.up=true;
document.getElementById("up").ontouchend=()=>c.up=false;

document.getElementById("down").ontouchstart=()=>c.down=true;
document.getElementById("down").ontouchend=()=>c.down=false;

document.getElementById("left").ontouchstart=()=>c.left=true;
document.getElementById("left").ontouchend=()=>c.left=false;

document.getElementById("right").ontouchstart=()=>c.right=true;
document.getElementById("right").ontouchend=()=>c.right=false;

// 🚗 UPDATE
function update(){

if(c.up) car.position.z -= 0.6;
if(c.down) car.position.z += 0.6;
if(c.left) car.position.x -= 0.6;
if(c.right) car.position.x += 0.6;

// 👮 police IA simple (poursuite)
police.position.lerp(car.position,0.01);

// caméra suit
camera.position.x = car.position.x;
camera.position.z = car.position.z + 25;
camera.lookAt(car.position);
}

// 🎮 LOOP
function animate(){
requestAnimationFrame(animate);
update();
renderer.render(scene,camera);
}
animate();

// 📱 resize mobile
window.addEventListener("resize",()=>{
camera.aspect=window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth,window.innerHeight);
});
</script>

</body>
</html>
