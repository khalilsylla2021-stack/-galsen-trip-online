<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>GTA Open World Dakar</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">

<style>
body { margin:0; overflow:hidden; font-family:Arial; }

canvas { display:block; background:#1f8a4c; }

#hud{
position:fixed;
top:10px;
left:10px;
background:rgba(0,0,0,0.7);
color:white;
padding:10px;
border-radius:8px;
font-size:14px;
z-index:10;
}
</style>
</head>

<body>

<div id="hud">
🌍 GTA DAKAR OPEN WORLD<br>
💰 <span id="money">0</span><br>
⭐ <span id="wanted">0</span>
</div>

<canvas id="game"></canvas>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

// 🌍 MONDE GRAND (DAKAR SIMPLIFIÉ)
const world={w:3000,h:3000};

// 🚗 JOUEUR
let car={x:1500,y:1500,size:40,speed:8};

// 🎯 STATS
let money=0;
let wanted=0;

// 🎯 MISSIONS (points dans Dakar)
let mission={
x:1000+Math.random()*1000,
y:1000+Math.random()*1000
};

// CAMERA
let cam={x:0,y:0};

function update(){

// déplacement
if(keys["ArrowLeft"])car.x-=car.speed;
if(keys["ArrowRight"])car.x+=car.speed;
if(keys["ArrowUp"])car.y-=car.speed;
if(keys["ArrowDown"])car.y+=car.speed;

// caméra suit joueur
cam.x=car.x-canvas.width/2;
cam.y=car.y-canvas.height/2;

// limites monde
cam.x=Math.max(0,Math.min(world.w-canvas.width,cam.x));
cam.y=Math.max(0,Math.min(world.h-canvas.height,cam.y));

// mission
let dx=car.x-mission.x;
let dy=car.y-mission.y;

if(Math.sqrt(dx*dx+dy*dy)<60){
money+=150;
wanted=Math.min(5,wanted+1);

// nouvelle mission dans Dakar
mission.x=Math.random()*world.w;
mission.y=Math.random()*world.h;

document.getElementById("money").innerText=money;
document.getElementById("wanted").innerText=wanted;
}
}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

// 🌍 carte Dakar (fond vert)
ctx.fillStyle="#1f8a4c";
ctx.fillRect(0,0,world.w,world.h);

// routes simples (grille ville)
ctx.strokeStyle="#2b2b2b";
for(let i=0;i<20;i++){
ctx.beginPath();
ctx.moveTo(i*150-cam.x,0-cam.y);
ctx.lineTo(i*150-cam.x,world.h-cam.y);
ctx.stroke();

ctx.beginPath();
ctx.moveTo(0-cam.x,i*150-cam.y);
ctx.lineTo(world.w-cam.x,i*150-cam.y);
ctx.stroke();
}

// mission (DAKAR OBJECTIF)
ctx.fillStyle="yellow";
ctx.beginPath();
ctx.arc(mission.x-cam.x,mission.y-cam.y,25,0,Math.PI*2);
ctx.fill();

// voiture
ctx.fillStyle="white";
ctx.fillRect(car.x-cam.x,car.y-cam.y,car.size,car.size);

// police alert
if(wanted>0){
ctx.fillStyle="red";
ctx.font="22px Arial";
ctx.fillText("🚓 POLICE DAKAR ALERT",200,50);
}
}

let keys={};
window.addEventListener("keydown",e=>keys[e.key]=true);
window.addEventListener("keyup",e=>keys[e.key]=false);

function loop(){
update();
draw();
requestAnimationFrame(loop);
}
loop();
</script>

</body>
</html>
