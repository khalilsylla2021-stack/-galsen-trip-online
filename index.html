<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Galsen Trip Test</title>

<style>
body { margin:0; overflow:hidden; font-family:Arial; }
canvas { display:block; background:#2ecc71; }

#hud{
 position:fixed;
 top:10px;
 left:10px;
 background:rgba(0,0,0,0.7);
 color:white;
 padding:10px;
 border-radius:8px;
}
</style>
</head>

<body>

<div id="hud">
🎮 Galsen Trip<br>
💰 Argent: <span id="money">0</span><br>
⭐ Wanted: <span id="wanted">0</span>
</div>

<canvas id="game"></canvas>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

// 🚗 voiture AU CENTRE (donc toujours visible)
let car={
 x:canvas.width/2,
 y:canvas.height/2,
 size:40,
 speed:6
};

// 🎯 mission proche du joueur
let mission={
 x:car.x+100,
 y:car.y+100
};

let money=0;
let wanted=0;

let keys={};

window.addEventListener("keydown",e=>keys[e.key]=true);
window.addEventListener("keyup",e=>keys[e.key]=false);

function update(){

if(keys["ArrowLeft"])car.x-=car.speed;
if(keys["ArrowRight"])car.x+=car.speed;
if(keys["ArrowUp"])car.y-=car.speed;
if(keys["ArrowDown"])car.y+=car.speed;

// collision mission
let dx=car.x-mission.x;
let dy=car.y-mission.y;

if(Math.sqrt(dx*dx+dy*dy)<40){
 money+=100;
 wanted=Math.min(5,wanted+1);

 mission.x=Math.random()*canvas.width;
 mission.y=Math.random()*canvas.height;

 document.getElementById("money").innerText=money;
 document.getElementById("wanted").innerText=wanted;
}
}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

// fond vert
ctx.fillStyle="#2ecc71";
ctx.fillRect(0,0,canvas.width,canvas.height);

// mission (JAUNE TRÈS VISIBLE)
ctx.fillStyle="yellow";
ctx.beginPath();
ctx.arc(mission.x,mission.y,20,0,Math.PI*2);
ctx.fill();

// voiture (GROS CUBE BLANC)
ctx.fillStyle="white";
ctx.fillRect(car.x,car.y,car.size,car.size);

// texte debug
ctx.fillStyle="black";
ctx.fillText("CAR OK",car.x,car.y-10);

if(wanted>0){
 ctx.fillStyle="red";
 ctx.fillText("🚓 POLICE ALERT",300,50);
}
}

function loop(){
update();
draw();
requestAnimationFrame(loop);
}
loop();
</script>

</body>
</html>
