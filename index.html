<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Galsen Trip V2.1</title>

<style>
body {
  margin: 0;
  overflow: hidden;
}

canvas {
  display: block;
}

/* 🎮 joystick */
#joystickArea {
  position: absolute;
  bottom: 40px;
  left: 40px;
  width: 140px;
  height: 140px;
  background: rgba(255,255,255,0.2);
  border-radius: 50%;
  z-index: 10;
}

#stick {
  position: absolute;
  width: 60px;
  height: 60px;
  background: white;
  border-radius: 50%;
  top: 40px;
  left: 40px;
  touch-action: none;
}
</style>
</head>

<body>

<div id="joystickArea">
  <div id="stick"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<script>
let scene, camera, renderer, car;

// 🎮 joueur
let dx = 0;
let dy = 0;
let speed = 0.3;

// 🧍 PNJ
let pnjList = [];

init();
animate();

function init() {

  // 🌍 scene
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x87ceeb);

  // 📷 camera
  camera = new THREE.PerspectiveCamera(
    75,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
  );

  // 🎮 renderer
  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  // 🌱 sol
  const ground = new THREE.Mesh(
    new THREE.PlaneGeometry(200, 200),
    new THREE.MeshBasicMaterial({ color: 0x2ecc71 })
  );
  ground.rotation.x = -Math.PI / 2;
  scene.add(ground);

  // 🚗 voiture
  car = new THREE.Mesh(
    new THREE.BoxGeometry(2, 1, 4),
    new THREE.MeshBasicMaterial({ color: 0xff0000 })
  );
  car.position.y = 0.5;
  scene.add(car);

  // 🧍 PNJ (5 personnes)
  for (let i = 0; i < 5; i++) {

    let pnj = new THREE.Mesh(
      new THREE.BoxGeometry(1, 2, 1),
      new THREE.MeshBasicMaterial({ color: 0x0000ff })
    );

    pnj.position.x = (Math.random() - 0.5) * 60;
    pnj.position.z = (Math.random() - 0.5) * 60;
    pnj.position.y = 1;

    pnj.speed = 0.02 + Math.random() * 0.03;

    scene.add(pnj);
    pnjList.push(pnj);
  }

  camera.position.set(0, 5, 10);

  setupJoystick();
  window.addEventListener("resize", onResize);
}

function animate() {
  requestAnimationFrame(animate);

  // 🚗 mouvement voiture
  car.position.x += dx * speed;
  car.position.z += dy * speed;

  // 🧍 PNJ movement
  for (let i = 0; i < pnjList.length; i++) {
    let p = pnjList[i];

    p.position.x += Math.sin(Date.now() * 0.001 + i) * p.speed;
    p.position.z += Math.cos(Date.now() * 0.001 + i) * p.speed;
  }

  // 📷 caméra follow
  camera.position.x = car.position.x;
  camera.position.z = car.position.z + 10;
  camera.lookAt(car.position);

  renderer.render(scene, camera);
}

function onResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

/* 🎮 JOYSTICK */
function setupJoystick() {

  const stick = document.getElementById("stick");
  const area = document.getElementById("joystickArea");

  const center = 70;
  const maxDist = 50;

  function moveJoy(e) {

    let t = e.touches[0];
    let rect = area.getBoundingClientRect();

    let x = t.clientX - rect.left - center;
    let y = t.clientY - rect.top - center;

    let dist = Math.sqrt(x*x + y*y);

    if (dist > maxDist) {
      x = (x / dist) * maxDist;
      y = (y / dist) * maxDist;
    }

    stick.style.transform = `translate(${x}px, ${y}px)`;

    dx = x / maxDist;
    dy = y / maxDist;
  }

  area.addEventListener("touchstart", moveJoy);
  area.addEventListener("touchmove", moveJoy);

  area.addEventListener("touchend", () => {
    dx = 0;
    dy = 0;
    stick.style.transform = "translate(0px,0px)";
  });
}
</script>

</body>
</html>
