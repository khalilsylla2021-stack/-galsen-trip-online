<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galsen Trip V5.1 - Dakar GTA</title>

<style>
body{margin:0;overflow:hidden;font-family:Arial;}

/* MENU */
#menu{
position:absolute;width:100%;height:100%;
background:#000;color:white;
display:flex;flex-direction:column;
justify-content:center;align-items:center;
z-index:1000;
}

/* HUD */
#hud{
position:absolute;top:10px;left:10px;
color:white;z-index:10;font-size:14px;
background:rgba(0,0,0,0.3);
padding:8px;
border-radius:8px;
}

/* MINI MAP */
#minimap{
position:absolute;top:10px;right:10px;
width:130px;height:130px;
background:rgba(0,0,0,0.5);
border:2px solid white;
border-radius:8px;
}

/* JOYSTICK */
#joystick{
position:absolute;bottom:40px;left:40px;
width:140px;height:140px;
background:rgba(255,255,255,0.2);
border-radius:50%;
}

#stick{
position:absolute;width:60px;height:60px;
background:white;border-radius:50%;
top:40px;left:40px;
}

/* CANVAS */
canvas{display:block;}
</style>
</head>

<body>

<div id="menu">
<h1>🌍 Galsen Trip V5.1 - Dakar</h1>
<button onclick="startGame()">▶ Jouer</button>
<button onclick="loadGame()">💾 Charger</button>
</div>

<div id="hud">
💰 <span id="money">0</span> |
🚨 <span id="wanted">0</span> |
🌦️ <span id="weather">Soleil</span> |
🕒 <span id="time">Jour</span>
</div>

<canvas id="minimap"></canvas>

<div id="joystick">
<div id="stick"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
